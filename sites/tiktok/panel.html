<div id="authWarningTiktok" class="info-warning" style="display: none;">Open a TikTok video page to scrape comments.</div>

<div class="controls">
  <div class="control-left">
    <button id="startTiktokScraping">Scrape Comments</button>
    <div style="display: inline-block; margin-left: 10px;">
      <label for="tiktokScrapeLimit" style="font-size: 13px; color: var(--ui-text-2);">Limit:</label>
      <input type="number" id="tiktokScrapeLimit" value="50" min="1" max="10000" style="width: 60px; padding: 4px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-color); color: var(--text-color);">
    </div>
  </div>
  <div class="control-right">
    <button id="clearTiktokData" class="clear-btn">Clear Data</button>
  </div>
</div>

<div class="data-preview" style="margin-bottom: 12px;">
  <div class="data-preview-header">
    <div class="data-preview-title">Scrape Status</div>
  </div>
  <p class="subtle-note" id="tiktokStatusHeadline">Ready.</p>
</div>

<div class="data-preview">
  <div class="data-preview-header">
    <div class="data-preview-title">TikTok Comments (<span id="tiktokCommentCount">0</span>)</div>
  </div>
  <p class="subtle-note">Captured from the active TikTok video page.</p>
  <div class="raw-json-toolbar">
    <span>Exact stored payload</span>
    <div class="toolbar-actions">
      <button id="loadTiktokJson" class="copy-json-btn">Load JSON</button>
      <button id="downloadTiktokJson" class="copy-json-btn">Download JSON</button>
      <button id="copyTiktokJson" class="copy-json-btn">Copy JSON</button>
    </div>
  </div>
  <textarea id="tiktokJsonOutput" class="raw-json" readonly></textarea>
</div>
