<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 760px;
      min-height: 620px;
      padding: 24px;
      margin: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #fafafa;
      color: #1a1f36;
      overflow-y: auto;
    }

    /* ── Top-level site tabs ── */

    .header {
      margin-bottom: 20px;
      text-align: center;
      padding: 0 16px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 600;
      margin: 0 0 8px 0;
    }

    .header p {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      color: #697386;
    }

    .site-tabs {
      display: inline-flex;
      gap: 6px;
      padding: 5px;
      background: #fff;
      border: 1px solid #e6e8eb;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .site-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid transparent;
      background: transparent;
      color: #495057;
      padding: 9px 16px;
      font-size: 14px;
      border-radius: 9px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .site-tab:hover {
      background: #f8f9fa;
      color: #1a1f36;
      transform: none;
    }

    .site-tab.active {
      background: #ececff;
      border-color: #d7d6ff;
      color: #3d38ad;
    }

    .site-tab .tab-icon {
      font-size: 16px;
    }

    /* ── Per-site panel container ── */

    #siteContent {
      min-height: 400px;
    }

    /* ── Sub-tab nav (used within site panels like Upwork) ── */

    .site-tab-nav {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      background: #fff;
      border: 1px solid #e6e8eb;
      border-radius: 10px;
      margin-bottom: 16px;
    }

    .site-tab-btn {
      border: 1px solid transparent;
      background: transparent;
      color: #495057;
      padding: 8px 12px;
      font-size: 13px;
      border-radius: 8px;
      font-weight: 600;
    }

    .site-tab-btn:hover {
      transform: none;
      background: #f8f9fa;
      color: #1a1f36;
    }

    .site-tab-btn.active {
      background: #ececff;
      border-color: #d7d6ff;
      color: #3d38ad;
    }

    .site-tab-panel {
      display: none;
    }

    .site-tab-panel.active {
      display: block;
    }

    /* ── Controls ── */

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      padding: 12px;
      background: #fff;
      border: 1px solid #e6e8eb;
      border-radius: 10px;
    }

    .control-left,
    .control-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .control-right {
      font-size: 13px;
      color: #495057;
      font-weight: 600;
    }

    .mode-select {
      height: 36px;
      border: 1px solid #d8dadd;
      border-radius: 8px;
      padding: 0 10px;
      background: #fff;
      color: #1a1f36;
      font-size: 13px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #635bff;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    button:hover {
      background: #5851e9;
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .clear-btn {
      background: transparent;
      color: #6c757d;
      border: 1px solid #d8dadd;
      font-weight: 500;
    }

    .clear-btn:hover {
      background: #fff;
      color: #dc3545;
      border-color: #dc3545;
      transform: none;
    }

    .auth-warning {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffe8a1;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 14px;
      display: none;
    }

    .info-warning {
      background: #e9f5ff;
      color: #0c5460;
      border: 1px solid #b8e1f7;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 14px;
      display: none;
    }

    /* ── Data previews ── */

    .data-preview {
      background: #fff;
      border: 1px solid #e6e8eb;
      border-radius: 12px;
      box-shadow: 0 2px 5px rgba(26, 31, 54, 0.05);
      padding: 12px;
    }

    .data-preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 0 2px;
    }

    .data-preview-title {
      font-size: 15px;
      font-weight: 600;
      color: #444;
    }

    .data-preview-title span {
      color: #14a800;
    }

    .subtle-note {
      margin: 0 0 10px 2px;
      font-size: 12px;
      color: #6c757d;
      line-height: 1.4;
    }

    .raw-json-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
      color: #6c757d;
      font-weight: 600;
    }

    .copy-json-btn {
      padding: 6px 10px;
      border: 1px solid #d8dadd;
      border-radius: 6px;
      background: #fff;
      color: #495057;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }

    .copy-json-btn:hover {
      background: #f8f9fa;
    }

    .toolbar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .raw-json {
      width: 100%;
      min-height: 390px;
      max-height: 430px;
      resize: vertical;
      box-sizing: border-box;
      border: 1px solid #dfe3e8;
      border-radius: 8px;
      padding: 10px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.45;
      color: #212529;
      background: #fbfcfd;
    }

    /* ── Coming soon placeholder ── */

    .coming-soon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 350px;
      text-align: center;
      color: #697386;
    }

    .coming-soon-icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .coming-soon h2 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1f36;
      margin: 0 0 8px 0;
    }

    .coming-soon p {
      font-size: 14px;
      margin: 0;
      line-height: 1.5;
    }

    /* ── Scrollbar ── */

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #c8c8c8;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Data Scraper</h1>
    <p>Multi-site data extraction tool.</p>
  </div>

  <div id="siteTabs" class="site-tabs">
    <!-- site tabs are rendered by popup.js -->
  </div>

  <div id="siteContent">
    <!-- site panel HTML is loaded dynamically -->
  </div>

  <script src="sites/upwork/panel.js"></script>
  <script src="sites/tiktok/panel.js"></script>
  <script src="popup.js"></script>
</body>
</html>
