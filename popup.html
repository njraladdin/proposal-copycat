<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 760px;
      height: 620px;
      padding: 24px;
      margin: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #fafafa;
      color: #1a1f36;
      overflow-y: auto;
    }

    .hero {
      margin-bottom: 20px;
      text-align: center;
      padding: 0 16px;
    }

    .hero h1 {
      font-size: 28px;
      font-weight: 600;
      margin: 0 0 8px 0;
    }

    .hero p {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      color: #697386;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      padding: 12px;
      background: #fff;
      border: 1px solid #e6e8eb;
      border-radius: 10px;
    }

    .control-left,
    .control-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .control-right {
      font-size: 13px;
      color: #495057;
      font-weight: 600;
    }

    .mode-select {
      height: 36px;
      border: 1px solid #d8dadd;
      border-radius: 8px;
      padding: 0 10px;
      background: #fff;
      color: #1a1f36;
      font-size: 13px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #635bff;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    button:hover {
      background: #5851e9;
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .clear-btn {
      background: transparent;
      color: #6c757d;
      border: 1px solid #d8dadd;
      font-weight: 500;
    }

    .clear-btn:hover {
      background: #fff;
      color: #dc3545;
      border-color: #dc3545;
      transform: none;
    }

    .auth-warning {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffe8a1;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 14px;
      display: none;
    }

    .data-preview {
      background: #fff;
      border: 1px solid #e6e8eb;
      border-radius: 12px;
      box-shadow: 0 2px 5px rgba(26, 31, 54, 0.05);
      padding: 12px;
    }

    .data-preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 0 2px;
    }

    .data-preview-title {
      font-size: 15px;
      font-weight: 600;
      color: #444;
    }

    .data-preview-title span {
      color: #14a800;
    }

    .subtle-note {
      margin: 0 0 10px 2px;
      font-size: 12px;
      color: #6c757d;
      line-height: 1.4;
    }

    .raw-json-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
      color: #6c757d;
      font-weight: 600;
    }

    .copy-json-btn {
      padding: 6px 10px;
      border: 1px solid #d8dadd;
      border-radius: 6px;
      background: #fff;
      color: #495057;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }

    .copy-json-btn:hover {
      background: #f8f9fa;
    }

    .toolbar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .raw-json {
      width: 100%;
      min-height: 390px;
      max-height: 430px;
      resize: vertical;
      box-sizing: border-box;
      border: 1px solid #dfe3e8;
      border-radius: 8px;
      padding: 10px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.45;
      color: #212529;
      background: #fbfcfd;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #c8c8c8;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Proposal Scraper</h1>
    <p>Collect your Upwork proposals and inspect the exact stored JSON.</p>
  </div>

  <div id="authWarning" class="auth-warning">Please sign in to Upwork first.</div>

  <div class="controls">
    <div class="control-left">
      <button id="startScraping">Start Scraping</button>
      <button id="clearData" class="clear-btn">Clear Data</button>
    </div>
    <div class="control-right">
      <label for="scrapeMode">Mode</label>
      <select id="scrapeMode" class="mode-select">
        <option value="successful">Successful only</option>
        <option value="all">All proposals</option>
      </select>
    </div>
  </div>

  <div class="data-preview">
    <div class="data-preview-header">
      <div class="data-preview-title">Scraped Proposals (<span id="proposalCount">0</span>)</div>
    </div>
    <p class="subtle-note">Fields: title, status, submitted at, scraped at, job description, cover letter, proposal URL.</p>
    <div class="raw-json-toolbar">
      <span>Exact stored payload</span>
      <div class="toolbar-actions">
        <button id="downloadRawJson" class="copy-json-btn">Download JSON</button>
        <button id="copyRawJson" class="copy-json-btn">Copy JSON</button>
      </div>
    </div>
    <textarea id="rawJsonOutput" class="raw-json" readonly></textarea>
  </div>

  <script src="popup.js"></script>
</body>
</html>
